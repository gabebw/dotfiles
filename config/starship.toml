"$schema" = 'https://starship.rs/config-schema.json'
# ANSI colors for fg:NUMBER
# https://i.stack.imgur.com/KTSQa.png

# Don't print a new line at the start of the prompt
add_newline = false

format = """
[](fg:lavender)\
$time\
[](bg:pink fg:lavender)\
$directory\
[](bg:blue fg:pink)\
$ruby\
$rust\
$nodejs\
$java\
$python\
[](bg:green fg:blue)\
$git_branch\
$git_status\
[](fg:green)\
$line_break\
$character"""

# See more palettes at the bottom of this file
palette = 'catppuccin_macchiato'

[os.symbols]
Windows = ""
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'

[directory]
style = "bg:pink fg:crust"
format = "[ $path ]($style)"
home_symbol = '~'
# The number of parent folders that the current directory should be truncated to.
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[time]
disabled = false
# https://docs.rs/chrono/0.4.7/chrono/format/strftime/index.html
time_format = "%A %I:%M %p"
style = "bg:lavender"
format = '[[  $time ](fg:crust bg:lavender)]($style)'
use_12hr = true

[git_branch]
format = '[ $symbol $branch ]($style)'
style = "fg:crust bg:green"
symbol = ""
truncation_length = 40

[nodejs]
symbol = ""
style = "fg:crust bg:blue"
format = '[ $symbol( $version) ]($style)'
version_format = "$major"
detect_files = ["package.json", ".node-version", "yarn.lock"]
detect_folders = ["node_modules"]
# Unlike the standard nodejs module, it intentionally does not check for
# *.js or *.ts since that triggers too often
detect_extensions = []

[ruby]
symbol = "💎"
style = "fg:crust bg:blue"
format = '[ $symbol( $version) ]($style)'
# Show ruby version in my home directory
detect_folders = ["Desktop"]
[java]
symbol = " "
style = "fg:crust bg:blue"
format = '[ $symbol($version)]($style)'

[python]
symbol = ""
format = '[ $symbol( $version)(\(#$virtualenv\)) ]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[❯](bold fg:green)'
# 0: no truncation
error_symbol = '[❯](bold fg:red)'
# 2: show 1 parent directory, etc
vimcmd_symbol = '[❮](bold fg:green)'
vimcmd_replace_one_symbol = '[❮](bold fg:lavender)'
vimcmd_replace_symbol = '[❮](bold fg:lavender)'
vimcmd_visual_symbol = '[❮](bold fg:yellow)'

[git_state]
format = "[\\($state( $progress_current/$progress_total)\\) ]($style)"
style = "bg:color_blue"
cherry_pick = "[🍒](fg:color_red bg:color_blue)"

[git_status]
style = "fg:crust bg:green"
format = """[(\\[\
$conflicted\
($stashed)\
($deleted )\
$modified\
$staged\
$untracked\
$typechanged\
$renamed\
\\] )\
$ahead_behind\
](bg:blue)"""
# $all_status = $conflicted $stashed $deleted $renamed $modified $typechanged $staged $untracked
# except $all_status doesn't have spaces
conflicted = "[=](red bg:blue)"
stashed = '[\$$count](fg:base bg:blue)'
deleted = "[✘$count](fg:red bg:blue)"
renamed = "[»](fg:base bg:blue)"
modified = "[M$count](fg:base bg:blue)"
staged = "[S$count](fg:orange bg:blue)"
untracked = "[?$count](base bg:blue)"
# $all_status = $conflicted $stashed $delete

behind = "[↓](bold fg:base bg:blue)"
ahead = "[↑](bold fg:base bg:blue)"
up_to_date = "[✓](bold fg:base bg:blue)"

[cmd_duration]
show_milliseconds = true
format = " took $duration "
style = "bg:lavender"
disabled = false
min_time_to_notify = 10_000

