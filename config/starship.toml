"$schema" = 'https://starship.rs/config-schema.json'
# ANSI colors for fg:NUMBER
# https://i.stack.imgur.com/KTSQa.png

# Don't print a new line at the start of the prompt
add_newline = false

format = """
[¯éÂ](fg:lavender)\
$time\
[¯é░](bg:pink fg:lavender)\
$directory\
[¯é░](bg:blue fg:pink)\
$ruby\
$rust\
$nodejs\
$java\
$python\
[¯é░](bg:green fg:blue)\
$git_branch\
$git_status\
[¯é┤](fg:green)\
$line_break\
$character"""

# See more palettes at the bottom of this file
palette = 'catppuccin_macchiato'

[os.symbols]
Windows = "¯£Å"
Ubuntu = "¾░òê"
SUSE = "´îö"
Raspbian = "¾░É┐"
Mint = "¾░ú¡"
Macos = "¾░ÇÁ"
Manjaro = "´îÆ"
Linux = "¾░î¢"
Gentoo = "¾░ú¿"
Fedora = "¾░úø"
Alpine = "´îÇ"
Amazon = "´ë░"
Android = "¯£Ä"
Arch = "¾░úç"
Artix = "¾░úç"
CentOS = "´îä"
Debian = "¾░úÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'

[directory]
style = "bg:pink fg:crust"
format = "[ $path ]($style)"
home_symbol	= '~'
# The number of parent folders that the current directory should be truncated to.
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "ÔÇª/"

[directory.substitutions]
# Light text
"Documents" = "¾░êÖ "
# Dark text
color_fg1 = "#11111b"  # crust from catpuccin_mocha
"Downloads" = "´ÇÖ "
color_bg3 = '#665c54'
"Music" = "¾░ØÜ "
color_aqua = '#689d6a'
"Pictures" = "´Ç¥ "
color_orange = '#fe8019'
"Developer" = "¾░▓ï "
color_red = '#fb4934'
color_yellow = '#d79921'

[time]
disabled = false
# https://docs.rs/chrono/0.4.7/chrono/format/strftime/index.html
time_format = "%A %I:%M %p"
style = "bg:lavender"
format = '[[ ´É║ $time ](fg:crust bg:lavender)]($style)'
use_12hr = true

[git_branch]
symbol = "´Éÿ"
style = "fg:crust bg:green"
truncation_length = 20
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:crust bg:green"
format = '([\[$all_status\]]($style))[( $ahead_behind )]($style)'
modified = "[M](italic fg:red bg:green)"
stashed = "[S](fg:crust bg:green)"

[nodejs]
symbol = "¯£ÿ"
style = "fg:crust bg:blue"
format = '[ $symbol( $version) ]($style)'
version_format = "$major"
detect_files = ["package.json", ".node-version", "yarn.lock"]
detect_folders = ["node_modules"]
# Unlike the standard nodejs module, it intentionally does not check for
# *.js or *.ts since that triggers too often
detect_extensions = []

[ruby]
symbol = "­ƒÆÄ"
style = "fg:crust bg:blue"
format = '[ $symbol( $version) ]($style)'
# Show ruby version in my home directory
detect_folders = ["Desktop"]
[java]
symbol = "¯ëû "
style = "fg:crust bg:blue"
format = '[ $symbol($version)]($style)'

[python]
symbol = "¯ÿå"
format = '[ $symbol( $version)(\(#$virtualenv\)) ]($style)'

[time]
disabled = false
# https://docs.rs/chrono/0.4.7/chrono/format/strftime/index.html
time_format = "%A %I:%M %p"
style = "bg:lavender"
format = '[[ ´É║ $time ](fg:crust bg:lavender)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[ÔØ»](bold fg:green)'
# 0: no truncation
error_symbol = '[ÔØ»](bold fg:red)'
# 2: show 1 parent directory, etc
vimcmd_symbol = '[ÔØ«](bold fg:green)'
style = "fg:color_fg1 bg:color_yellow"
vimcmd_replace_one_symbol = '[ÔØ«](bold fg:lavender)'
vimcmd_replace_symbol = '[ÔØ«](bold fg:lavender)'
vimcmd_visual_symbol = '[ÔØ«](bold fg:yellow)'
truncate_to_repo = true

[git_branch]
format = "[($symbol$branch )]($style)"
style = "bg:color_blue"
truncation_length = 40

[git_state]
format = "[\\($state( $progress_current/$progress_total)\\) ]($style)"
style = "bg:color_blue"
cherry_pick = "[­ƒìÆ](fg:color_red bg:color_blue)"

[git_status]
format = """[(\\[\
$conflicted\
($stashed)\
($deleted )\
$modified\
$staged\
$untracked\
$typechanged\
$renamed\
\\] )\
$ahead_behind\
](bg:color_blue)"""
# $all_status = $conflicted $stashed $delete

[cmd_duration]
show_milliseconds = true
format = "¯½┤ took $duration "
style = "bg:lavender"
disabled = false
min_time_to_notify = 10_000

